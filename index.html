<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Our Honeymoon</title>

<!-- Leaflet (free map, no API key) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root{
    --bg:#fbf7f4; --card:#ffffff; --ink:#3a2e2a; --muted:#8a7a72;
    --accent:#c46b6b; --accent-dark:#a34f4f; --gold:#c9a24b; --line:#ece0d8;
    --shadow:0 6px 24px rgba(90,60,50,.10); --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:Georgia,"Times New Roman",serif;font-weight:600;margin:0 0 .3em}
  a{color:var(--accent-dark);text-decoration:none}
  img{max-width:100%}

  header{position:sticky;top:0;z-index:1000;background:rgba(251,247,244,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .bar{max-width:1080px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px}
  .brand{font-family:Georgia,serif;font-size:1.15rem;color:var(--accent-dark);cursor:pointer;white-space:nowrap}
  .brand .heart{color:var(--accent)}
  .spacer{flex:1}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:7px 14px;border-radius:999px;cursor:pointer;font-size:.86rem;transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:var(--accent-dark)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:var(--accent-dark)}
  .btn.ghost{background:transparent;border-color:transparent}
  .btn.danger{color:#b5453b;border-color:#ecccc8}
  .btn.small{padding:4px 10px;font-size:.78rem}

  main{max-width:1080px;margin:0 auto;padding:22px 20px 80px}
  .hero{text-align:center;padding:26px 10px 10px}
  .hero h1{font-size:2.5rem;line-height:1.1}
  .hero .sub{color:var(--muted);font-size:1.05rem}
  .hero .dates{display:inline-block;margin-top:8px;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;font-size:.8rem}

  #map, .leg-map{height:420px;width:100%;border-radius:var(--radius);box-shadow:var(--shadow);margin:18px 0;z-index:1}
  .leg-map{height:300px}

  .section-title{display:flex;align-items:center;gap:10px;margin:26px 0 6px}
  .section-title::after{content:"";flex:1;height:1px;background:var(--line)}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.18s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-3px);border-color:var(--accent)}
  .card .thumb{height:120px;background:linear-gradient(135deg,#e9c9c0,#d8a7a7);position:relative}
  .card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .card .num{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.9);color:var(--accent-dark);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}
  .card .body{padding:14px 16px 16px}
  .card h3{font-size:1.15rem;margin-bottom:2px}
  .card .when{color:var(--gold);font-size:.78rem;text-transform:uppercase;letter-spacing:.05em}
  .card p{color:var(--muted);font-size:.9rem;margin:.5em 0 0}

  .leg-head{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-top:8px}
  .leg-head h1{font-size:2.1rem}
  .leg-head .when{color:var(--gold);text-transform:uppercase;letter-spacing:.05em;font-size:.85rem}
  .detail-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:24px;margin-top:6px}
  @media(max-width:760px){.detail-grid{grid-template-columns:1fr}.hero h1{font-size:2rem}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:16px}
  .panel h3{color:var(--accent-dark);font-size:1.05rem;border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:10px}
  ul.highlights{margin:6px 0 0;padding-left:18px}
  ul.highlights li{margin:4px 0}
  .prose{white-space:pre-wrap}

  /* Legend */
  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin:10px 0 4px}
  .legend .chip{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:var(--muted)}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}

  /* Day-by-day timeline */
  .day{margin:0 0 18px}
  .day .dhead{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
  .day .dhead .dnum{font-family:Georgia,serif;font-size:1.15rem;color:var(--accent-dark)}
  .day .dhead .dwk{color:var(--gold);text-transform:uppercase;letter-spacing:.05em;font-size:.76rem}
  .day .dhead .ddate{color:var(--muted);font-size:.85rem}
  .acts{border-left:2px solid var(--line);margin-left:6px;padding-left:0}
  .act{display:flex;gap:12px;padding:9px 0 9px 16px;position:relative}
  .act::before{content:"";position:absolute;left:-7px;top:15px;width:12px;height:12px;border-radius:50%;background:var(--catcolor,#bbb);border:2px solid var(--bg)}
  .act .time{min-width:74px;color:var(--muted);font-size:.82rem;padding-top:1px}
  .act .body2{flex:1}
  .act .title{font-weight:600}
  .act .cat{font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--catcolor,#999);margin-left:8px}
  .act .anote{color:var(--muted);font-size:.86rem;margin-top:2px;white-space:pre-wrap}
  .day-empty{color:var(--muted);font-size:.9rem;padding:6px 0 6px 16px}

  .legnav{display:flex;justify-content:space-between;gap:12px;margin-top:24px}
  .legnav .btn{flex:1;text-align:center}

  /* Editor */
  .edit-banner{background:#fff4ec;border:1px dashed var(--gold);border-radius:12px;padding:10px 14px;margin:14px 0;color:#8a6a2e;font-size:.9rem}
  label.form{display:block;margin:0 0 12px}
  label.form .lab{display:block;font-size:.78rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
  input,textarea,select{width:100%;font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  textarea{resize:vertical;min-height:70px}
  input[type=color]{padding:2px;height:38px;width:52px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:100px 1fr 150px;gap:10px;align-items:end}
  @media(max-width:640px){.row3{grid-template-columns:1fr 1fr}}
  .leg-editor{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
  .leg-editor .eh{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .leg-editor .eh h3{flex:1;margin:0}
  .coordhelp{font-size:.8rem;color:var(--muted);margin:-4px 0 8px}
  .pickmap{height:220px;border-radius:12px;margin:6px 0 12px;border:1px solid var(--line)}
  .day-edit{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:0 0 12px;background:#fdfaf8}
  .day-edit .dh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .day-edit .dh .wk{color:var(--gold);font-size:.76rem;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
  .act-edit{display:flex;gap:8px;align-items:flex-start;margin:0 0 8px}
  .act-edit .grip{color:var(--catcolor,#bbb);padding-top:10px;font-size:1.1rem;line-height:1}
  .act-fields{flex:1;display:grid;grid-template-columns:90px 1fr 140px;gap:8px}
  @media(max-width:640px){.act-fields{grid-template-columns:1fr 1fr}}
  .cat-row{display:flex;align-items:center;gap:8px;margin:0 0 8px}
  .cat-row input[type=text]{flex:1}
  .catswatch{width:16px;height:16px;border-radius:50%;flex:0 0 auto}
  .hidden{display:none!important}
  .mini{font-size:.8rem;color:var(--muted)}
  footer{max-width:1080px;margin:0 auto;padding:20px;color:var(--muted);font-size:.8rem;text-align:center}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:.88rem;opacity:0;transition:.3s;pointer-events:none;z-index:2000}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand" onclick="go('')"><span class="heart">&#10084;</span> <span id="brandTitle">Our Honeymoon</span></div>
    <div class="spacer"></div>
    <button class="btn ghost" id="editToggle" onclick="toggleEdit()">Edit</button>
    <button class="btn ghost small" onclick="doImport()">Import</button>
    <button class="btn ghost small" onclick="doExport()">Export</button>
  </div>
</header>

<main id="app"></main>

<footer>
  Made with love &middot; runs on GitHub Pages, no account needed &middot;
  <a href="#" onclick="resetData();return false;">reset to saved file</a>
</footer>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="application/json" class="hidden" />

<script>
/* ------------------------------------------------------------------
   DATA: loads ./data.json when hosted. Your edits save in this browser
   (localStorage). Export downloads data.json to commit + share.
-------------------------------------------------------------------*/
const LS_KEY = "honeymoon_data_v2";

const DEFAULT_CATEGORIES = [
  {id:"transport",   label:"Transportation", color:"#2f6fb0"},
  {id:"dining",      label:"Dining",         color:"#c0562e"},
  {id:"boat",        label:"Boat outing",    color:"#1d9e75"},
  {id:"winery",      label:"Winery",         color:"#8e3b63"},
  {id:"sightseeing", label:"Sightseeing",    color:"#b8811a"},
  {id:"lodging",     label:"Lodging",        color:"#6b6b6b"},
  {id:"leisure",     label:"Free time",      color:"#4f8a3d"}
];

const DEFAULT_DATA = {
  trip:{ title:"Our Honeymoon", subtitle:"", dates:"Autumn 2026" },
  categories: DEFAULT_CATEGORIES.map(c=>({...c})),
  legs:[
    {
      id:"paris", name:"Paris, France", when:"Days 1–3",
      lat:48.8566, lng:2.3522, photo:"",
      summary:"Where it all begins — croissants, the Seine at dusk, and a kiss under the Eiffel Tower.",
      lodging:"Hôtel des Amoureux, Le Marais", highlights:[], notes:"",
      days:[
        {id:"d1", date:"2026-09-10", label:"Arrival", activities:[
          {id:"a1", time:"3:00 PM", title:"Check in at hotel", type:"lodging", note:""},
          {id:"a2", time:"Evening", title:"Sunset picnic by the Seine", type:"leisure", note:"Grab wine + cheese near Pont Neuf."},
          {id:"a3", time:"8:30 PM", title:"Dinner in Le Marais", type:"dining", note:""}
        ]},
        {id:"d2", date:"2026-09-11", label:"", activities:[
          {id:"a4", time:"9:00 AM", title:"Louvre morning", type:"sightseeing", note:"Pre-book timed entry."},
          {id:"a5", time:"1:00 PM", title:"Lunch in the Tuileries", type:"dining", note:""},
          {id:"a6", time:"7:00 PM", title:"Eiffel Tower summit", type:"sightseeing", note:"Book the summit lift ahead."}
        ]},
        {id:"d3", date:"2026-09-12", label:"", activities:[
          {id:"a7", time:"10:00 AM", title:"Montmartre wander", type:"leisure", note:""},
          {id:"a8", time:"6:00 PM", title:"Train to next stop", type:"transport", note:""}
        ]}
      ]
    },
    {
      id:"santorini", name:"Santorini, Greece", when:"Days 4–6",
      lat:36.3932, lng:25.4615, photo:"",
      summary:"White-washed cliffs, blue domes, and the most famous sunset in the world.",
      lodging:"Cave suite in Oia", highlights:[], notes:"",
      days:[
        {id:"e1", date:"2026-09-13", label:"", activities:[
          {id:"b1", time:"Afternoon", title:"Catamaran sunset cruise", type:"boat", note:"Includes dinner on board."}
        ]},
        {id:"e2", date:"2026-09-14", label:"", activities:[
          {id:"b2", time:"11:00 AM", title:"Wine tasting in Megalochori", type:"winery", note:""},
          {id:"b3", time:"8:00 PM", title:"Cliffside dinner in Oia", type:"dining", note:""}
        ]}
      ]
    }
  ]
};

let DATA = null;

function normalize(d){
  d = d || {};
  d.trip = d.trip || {title:"Our Honeymoon", subtitle:"", dates:""};
  if(d.trip.subtitle == null) d.trip.subtitle = "";
  if(!Array.isArray(d.categories) || d.categories.length===0){
    d.categories = DEFAULT_CATEGORIES.map(c=>({...c}));
  }
  d.legs = Array.isArray(d.legs) ? d.legs : [];
  d.legs.forEach(l=>{
    if(!l.id) l.id = uid();
    if(!Array.isArray(l.highlights)) l.highlights = [];
    if(!Array.isArray(l.days)) l.days = [];
    l.days.forEach(day=>{
      if(!day.id) day.id = uid();
      if(day.date==null) day.date = "";
      if(day.label==null) day.label = "";
      if(!Array.isArray(day.activities)) day.activities = [];
      day.activities.forEach(a=>{
        if(!a.id) a.id = uid();
        if(a.time==null) a.time = "";
        if(a.title==null) a.title = "";
        if(!a.type) a.type = (d.categories[0]&&d.categories[0].id) || "sightseeing";
        if(a.note==null) a.note = "";
      });
    });
  });
  return d;
}

async function loadData(){
  const saved = localStorage.getItem(LS_KEY);
  if(saved){ try{ DATA = normalize(JSON.parse(saved)); return; }catch(e){} }
  try{
    const r = await fetch("data.json", {cache:"no-store"});
    if(r.ok){ DATA = normalize(await r.json()); return; }
  }catch(e){}
  DATA = normalize(JSON.parse(JSON.stringify(DEFAULT_DATA)));
}

function save(){ localStorage.setItem(LS_KEY, JSON.stringify(DATA)); }

function resetData(){
  if(!confirm("Discard edits saved in this browser and reload the trip from data.json?")) return;
  localStorage.removeItem(LS_KEY); location.hash=""; location.reload();
}

/* ---------------- ROUTING ---------------- */
let EDIT = false;
function go(hash){ location.hash = hash; }
window.addEventListener("hashchange", render);
function currentRoute(){
  const h = location.hash.replace(/^#\/?/,"");
  if(h.startsWith("leg/")) return {view:"leg", id:h.slice(4)};
  return {view:"home"};
}

/* ---------------- HELPERS ---------------- */
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function legIndex(id){return DATA.legs.findIndex(l=>l.id===id);}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}
function uid(){return "x"+Math.random().toString(36).slice(2,9);}
function cat(id){return DATA.categories.find(c=>c.id===id) || {id:id,label:id||"—",color:"#bbb"};}
function catColor(id){return cat(id).color;}
function catLabel(id){return cat(id).label;}

function dayInfo(dateStr){
  if(!dateStr) return null;
  const p = String(dateStr).split("-");
  if(p.length!==3) return null;
  const dt = new Date(+p[0], +p[1]-1, +p[2]);
  if(isNaN(dt.getTime())) return null;
  return {
    weekday: dt.toLocaleDateString(undefined,{weekday:"long"}),
    nice: dt.toLocaleDateString(undefined,{month:"long",day:"numeric",year:"numeric"})
  };
}
function addDays(dateStr, n){
  const p = String(dateStr).split("-");
  if(p.length!==3) return "";
  const dt = new Date(+p[0], +p[1]-1, +p[2]);
  if(isNaN(dt.getTime())) return "";
  dt.setDate(dt.getDate()+n);
  const mm = String(dt.getMonth()+1).padStart(2,"0");
  const dd = String(dt.getDate()).padStart(2,"0");
  return dt.getFullYear()+"-"+mm+"-"+dd;
}

/* ---------------- RENDER ---------------- */
let maps = [];
function clearMaps(){ maps.forEach(m=>{try{m.remove();}catch(e){}}); maps=[]; }

function render(){
  clearMaps();
  document.getElementById("brandTitle").textContent = DATA.trip.title || "Our Honeymoon";
  document.getElementById("editToggle").textContent = EDIT ? "Done editing" : "Edit";
  document.getElementById("editToggle").className = "btn " + (EDIT?"primary":"ghost");
  const route = currentRoute();
  if(route.view==="leg" && legIndex(route.id)>=0){
    EDIT ? renderLegEdit(route.id) : renderLeg(route.id);
  } else {
    EDIT ? renderHomeEdit() : renderHome();
  }
  window.scrollTo(0,0);
}

/* ----- HOME (view) ----- */
function renderHome(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="hero">
      <h1>${esc(DATA.trip.title)}</h1>
      ${DATA.trip.subtitle?`<div class="sub">${esc(DATA.trip.subtitle)}</div>`:""}
      ${DATA.trip.dates?`<div class="dates">${esc(DATA.trip.dates)}</div>`:""}
    </div>
    <div id="map"></div>
    <div class="section-title"><h2>The Itinerary</h2></div>
    <div class="cards" id="cards"></div>
  `;
  const cards = document.getElementById("cards");
  DATA.legs.forEach((l,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.onclick=()=>go("leg/"+l.id);
    div.innerHTML=`
      <div class="thumb">${l.photo?`<img src="${esc(l.photo)}" alt="">`:""}<div class="num">${i+1}</div></div>
      <div class="body">
        <div class="when">${esc(l.when||"")}</div>
        <h3>${esc(l.name)}</h3>
        <p>${esc((l.summary||"").slice(0,110))}${(l.summary||"").length>110?"…":""}</p>
      </div>`;
    cards.appendChild(div);
  });
  drawOverviewMap();
}

function drawOverviewMap(){
  const el=document.getElementById("map"); if(!el) return;
  const pts=DATA.legs.filter(l=>isFinite(l.lat)&&isFinite(l.lng));
  const map=L.map(el,{scrollWheelZoom:false}); maps.push(map);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OpenStreetMap",maxZoom:18}).addTo(map);
  if(pts.length===0){ map.setView([20,0],2); return; }
  const latlngs=[];
  pts.forEach(l=>{
    const idx=legIndex(l.id);
    const m=L.marker([l.lat,l.lng]).addTo(map);
    m.bindPopup(`<b>${idx+1}. ${esc(l.name)}</b><br>${esc(l.when||"")}<br><a href="#/leg/${l.id}">Open details →</a>`);
    latlngs.push([l.lat,l.lng]);
  });
  if(latlngs.length>1){
    L.polyline(latlngs,{color:"#c46b6b",weight:3,dashArray:"6 8",opacity:.8}).addTo(map);
    map.fitBounds(latlngs,{padding:[40,40]});
  } else { map.setView(latlngs[0],6); }
}

/* ----- LEG (view) ----- */
function renderLeg(id){
  const i=legIndex(id), l=DATA.legs[i];
  const app=document.getElementById("app");
  const hi=(l.highlights||[]).filter(x=>x&&x.trim());
  app.innerHTML=`
    <div class="leg-head">
      <h1>${esc(l.name)}</h1>
      <div class="when">${esc(l.when||"")}</div>
    </div>
    <p class="sub" style="color:var(--muted);max-width:640px">${esc(l.summary||"")}</p>
    <div class="detail-grid">
      <div>
        <div class="leg-map" id="map"></div>
        <div class="section-title"><h2>Day by day</h2></div>
        ${legendHTML()}
        <div id="timeline">${timelineHTML(l)}</div>
        ${l.notes?`<div class="panel"><h3>Notes &amp; tips</h3><div class="prose">${esc(l.notes)}</div></div>`:""}
      </div>
      <div>
        ${l.photo?`<div class="panel" style="padding:0;overflow:hidden"><img src="${esc(l.photo)}" alt="" style="display:block;width:100%"></div>`:""}
        ${l.lodging?`<div class="panel"><h3>Where we stay</h3>${esc(l.lodging)}</div>`:""}
        ${hi.length?`<div class="panel"><h3>Highlights</h3><ul class="highlights">${hi.map(h=>`<li>${esc(h)}</li>`).join("")}</ul></div>`:""}
      </div>
    </div>
    <div class="legnav">
      <button class="btn" ${i<=0?"disabled style=opacity:.4":`onclick="go('leg/${DATA.legs[i-1].id}')"`}>← ${i>0?esc(DATA.legs[i-1].name):"Start"}</button>
      <button class="btn" onclick="go('')">All legs</button>
      <button class="btn" ${i>=DATA.legs.length-1?"disabled style=opacity:.4":`onclick="go('leg/${DATA.legs[i+1].id}')"`}>${i<DATA.legs.length-1?esc(DATA.legs[i+1].name):"End"} →</button>
    </div>
  `;
  const el=document.getElementById("map");
  if(el && isFinite(l.lat) && isFinite(l.lng)){
    const map=L.map(el,{scrollWheelZoom:false}).setView([l.lat,l.lng],9); maps.push(map);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OpenStreetMap",maxZoom:18}).addTo(map);
    L.marker([l.lat,l.lng]).addTo(map).bindPopup(esc(l.name)).openPopup();
  } else if(el){
    el.innerHTML='<div style="display:flex;height:100%;align-items:center;justify-content:center;color:var(--muted)">No map location set yet — add coordinates in Edit mode.</div>';
  }
}

function legendHTML(){
  const chips = DATA.categories.map(c=>`<span class="chip"><span class="dot" style="background:${esc(c.color)}"></span>${esc(c.label)}</span>`).join("");
  return `<div class="legend">${chips}</div>`;
}

function timelineHTML(l){
  if(!l.days || l.days.length===0){
    return `<div class="mini">No days added yet. Click <b>Edit</b> to build a day-by-day plan.</div>`;
  }
  return l.days.map((day,di)=>{
    const info = dayInfo(day.date);
    const head = `
      <div class="dhead">
        <span class="dnum">Day ${di+1}${day.label?` · ${esc(day.label)}`:""}</span>
        ${info?`<span class="dwk">${esc(info.weekday)}</span><span class="ddate">${esc(info.nice)}</span>`:``}
      </div>`;
    const acts = (day.activities&&day.activities.length)
      ? `<div class="acts">${day.activities.map(a=>{
          const col=catColor(a.type);
          return `<div class="act" style="--catcolor:${esc(col)}">
            <div class="time">${esc(a.time||"")}</div>
            <div class="body2">
              <span class="title">${esc(a.title||"Untitled")}</span><span class="cat">${esc(catLabel(a.type))}</span>
              ${a.note?`<div class="anote">${esc(a.note)}</div>`:""}
            </div>
          </div>`;
        }).join("")}</div>`
      : `<div class="day-empty">No activities yet.</div>`;
    return `<div class="day">${head}${acts}</div>`;
  }).join("");
}

/* ---------------- EDIT MODE ---------------- */
function toggleEdit(){ EDIT=!EDIT; render(); }

/* ----- HOME EDIT: trip meta, categories, leg list ----- */
function renderHomeEdit(){
  const app=document.getElementById("app");
  app.innerHTML=`
    <div class="edit-banner">✎ Editing. Changes save automatically in this browser. When you're happy, click <b>Export</b> and commit <code>data.json</code> so your partner sees it too.</div>
    <div class="panel">
      <h3>Trip details</h3>
      <label class="form"><span class="lab">Title</span><input id="t_title" value="${esc(DATA.trip.title)}"></label>
      <label class="form"><span class="lab">Subtitle (optional)</span><input id="t_sub" value="${esc(DATA.trip.subtitle||"")}" placeholder="Leave blank for none"></label>
      <label class="form"><span class="lab">Dates</span><input id="t_dates" value="${esc(DATA.trip.dates||"")}"></label>
    </div>
    <div class="panel">
      <h3>Activity colors</h3>
      <div class="mini" style="margin-bottom:10px">These color-code every activity (transportation, dining, boat outings, wineries…). Rename them, recolor them, or add your own.</div>
      <div id="catList"></div>
      <button class="btn small" onclick="addCategory()">+ Add category</button>
    </div>
    <div class="section-title"><h2>Legs of the journey</h2></div>
    <div id="legList"></div>
    <button class="btn primary" onclick="addLeg()">+ Add a leg</button>
  `;
  bindMeta();
  renderCatList();
  const box=document.getElementById("legList");
  DATA.legs.forEach((l,i)=>box.appendChild(legRowEl(l,i)));
}

function bindMeta(){
  [["title","t_title"],["subtitle","t_sub"],["dates","t_dates"]].forEach(([k,id])=>{
    const el=document.getElementById(id); if(!el) return;
    el.addEventListener("input",e=>{DATA.trip[k]=e.target.value;save();if(k==="title")document.getElementById("brandTitle").textContent=DATA.trip.title||"Our Honeymoon";});
  });
}

function renderCatList(){
  const box=document.getElementById("catList"); if(!box) return;
  box.innerHTML="";
  DATA.categories.forEach((c,i)=>{
    const row=document.createElement("div");
    row.className="cat-row";
    row.innerHTML=`
      <input type="color" value="${esc(c.color)}" data-i="${i}" class="cat-color">
      <input type="text" value="${esc(c.label)}" data-i="${i}" class="cat-label">
      <button class="btn small danger" data-i="${i}" ${DATA.categories.length<=1?"disabled style=opacity:.3":""}>Remove</button>`;
    row.querySelector(".cat-color").addEventListener("input",e=>{DATA.categories[i].color=e.target.value;save();});
    row.querySelector(".cat-label").addEventListener("input",e=>{DATA.categories[i].label=e.target.value;save();});
    const del=row.querySelector(".btn.danger");
    if(!del.disabled) del.addEventListener("click",()=>removeCategory(i));
    box.appendChild(row);
  });
}
function addCategory(){
  DATA.categories.push({id:uid(),label:"New type",color:"#c46b6b"}); save(); renderCatList();
}
function removeCategory(i){
  const removed=DATA.categories[i];
  if(!confirm("Remove category “"+(removed.label||"")+"”? Activities using it will fall back to the first category.")) return;
  DATA.categories.splice(i,1);
  const fallback=(DATA.categories[0]&&DATA.categories[0].id)||"";
  DATA.legs.forEach(l=>(l.days||[]).forEach(d=>(d.activities||[]).forEach(a=>{if(a.type===removed.id)a.type=fallback;})));
  save(); renderCatList();
}

function legRowEl(l,i){
  const wrap=document.createElement("div");
  wrap.className="leg-editor";
  const dayCount=(l.days||[]).length;
  wrap.innerHTML=`
    <div class="eh">
      <h3>${i+1}. ${esc(l.name||"Untitled")}</h3>
      <button class="btn small" ${i===0?"disabled style=opacity:.3":""} onclick="moveLeg(${i},-1)">↑</button>
      <button class="btn small" ${i===DATA.legs.length-1?"disabled style=opacity:.3":""} onclick="moveLeg(${i},1)">↓</button>
      <button class="btn small danger" onclick="removeLeg(${i})">Delete</button>
    </div>
    <div class="mini" style="margin-bottom:10px">${dayCount} day${dayCount===1?"":"s"} planned</div>
    <button class="btn small primary" onclick="go('leg/${l.id}')">Edit this leg &amp; its days →</button>
  `;
  return wrap;
}

function addLeg(){
  DATA.legs.push({id:uid(),name:"New place",when:"",lat:null,lng:null,photo:"",summary:"",lodging:"",highlights:[],notes:"",days:[]});
  save(); render();
}
function removeLeg(i){
  if(!confirm("Delete “"+(DATA.legs[i].name||"this leg")+"”?")) return;
  DATA.legs.splice(i,1); save(); render();
}
function moveLeg(i,dir){
  const j=i+dir; if(j<0||j>=DATA.legs.length) return;
  [DATA.legs[i],DATA.legs[j]]=[DATA.legs[j],DATA.legs[i]]; save(); render();
}

/* ----- LEG EDIT: leg fields + day-by-day ----- */
function renderLegEdit(id){
  const i=legIndex(id), l=DATA.legs[i];
  const app=document.getElementById("app");
  app.innerHTML=`
    <div class="edit-banner">✎ Editing <b>${esc(l.name||"this leg")}</b>. Changes save automatically. Use <b>Export</b> when done to publish.</div>
    <button class="btn small" onclick="go('')">← Back to all legs</button>
    <div class="leg-editor" style="margin-top:12px">
      <div class="row2">
        <label class="form"><span class="lab">Place name</span><input data-lk="name" value="${esc(l.name)}"></label>
        <label class="form"><span class="lab">When (e.g. Days 1–3)</span><input data-lk="when" value="${esc(l.when||"")}"></label>
      </div>
      <label class="form"><span class="lab">Short summary</span><textarea data-lk="summary">${esc(l.summary||"")}</textarea></label>
      <label class="form"><span class="lab">Where we stay</span><input data-lk="lodging" value="${esc(l.lodging||"")}"></label>
      <label class="form"><span class="lab">Notes &amp; tips</span><textarea data-lk="notes">${esc(l.notes||"")}</textarea></label>
      <label class="form"><span class="lab">Photo URL (optional)</span><input data-lk="photo" value="${esc(l.photo||"")}" placeholder="https://…"></label>
      <div class="row2">
        <label class="form"><span class="lab">Latitude</span><input data-lk="lat" value="${l.lat??""}" placeholder="48.8566"></label>
        <label class="form"><span class="lab">Longitude</span><input data-lk="lng" value="${l.lng??""}" placeholder="2.3522"></label>
      </div>
      <div class="coordhelp">Tip: click the map to drop the pin and fill coordinates automatically.</div>
      <div class="pickmap" id="pick"></div>
    </div>

    <div class="section-title"><h2>Day by day</h2></div>
    ${legendHTML()}
    <div id="dayList"></div>
    <button class="btn primary" onclick="addDay('${l.id}')">+ Add a day</button>

    <div class="legnav">
      <button class="btn" ${i<=0?"disabled style=opacity:.4":`onclick="go('leg/${DATA.legs[i-1].id}')"`}>← Prev leg</button>
      <button class="btn" onclick="go('')">All legs</button>
      <button class="btn" ${i>=DATA.legs.length-1?"disabled style=opacity:.4":`onclick="go('leg/${DATA.legs[i+1].id}')"`}>Next leg →</button>
    </div>
  `;
  // bind leg field inputs
  app.querySelectorAll("[data-lk]").forEach(inp=>{
    inp.addEventListener("input",e=>{
      const k=inp.getAttribute("data-lk"); let v=e.target.value;
      if(k==="lat"||k==="lng"){ l[k]= v===""?null:parseFloat(v); }
      else { l[k]=v; }
      save();
    });
  });
  setTimeout(()=>initPicker(l),0);
  renderDayList(l);
}

function initPicker(l){
  const el=document.getElementById("pick"); if(!el) return;
  const has=isFinite(l.lat)&&isFinite(l.lng);
  const center=has?[l.lat,l.lng]:[20,0];
  const map=L.map(el,{scrollWheelZoom:false}).setView(center,has?7:2); maps.push(map);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OSM",maxZoom:18}).addTo(map);
  let marker=has?L.marker(center).addTo(map):null;
  map.on("click",e=>{
    l.lat=+e.latlng.lat.toFixed(5); l.lng=+e.latlng.lng.toFixed(5); save();
    if(marker) marker.setLatLng(e.latlng); else marker=L.marker(e.latlng).addTo(map);
    const la=document.querySelector('[data-lk="lat"]'), lo=document.querySelector('[data-lk="lng"]');
    if(la) la.value=l.lat; if(lo) lo.value=l.lng;
    toast("Pin set");
  });
}

function renderDayList(l){
  const box=document.getElementById("dayList"); if(!box) return;
  box.innerHTML="";
  (l.days||[]).forEach((day,di)=>box.appendChild(dayEditorEl(l,day,di)));
}

function catOptions(sel){
  return DATA.categories.map(c=>`<option value="${esc(c.id)}"${c.id===sel?" selected":""}>${esc(c.label)}</option>`).join("");
}

function dayEditorEl(l,day,di){
  const wrap=document.createElement("div");
  wrap.className="day-edit";
  const info=dayInfo(day.date);
  wrap.innerHTML=`
    <div class="dh">
      <b>Day ${di+1}</b>
      <span class="wk" data-wk>${info?esc(info.weekday):""}</span>
      <span class="spacer" style="flex:1"></span>
      <button class="btn small" ${di===0?"disabled style=opacity:.3":""} data-mv="-1">↑</button>
      <button class="btn small" ${di===(l.days.length-1)?"disabled style=opacity:.3":""} data-mv="1">↓</button>
      <button class="btn small danger" data-del-day>Delete day</button>
    </div>
    <div class="row2">
      <label class="form"><span class="lab">Date</span><input type="date" data-dk="date" value="${esc(day.date||"")}"></label>
      <label class="form"><span class="lab">Day label (optional)</span><input data-dk="label" value="${esc(day.label||"")}" placeholder="e.g. Arrival"></label>
    </div>
    <div class="acts-edit" data-acts></div>
    <button class="btn small" data-add-act>+ Add activity</button>
  `;
  // date + label
  wrap.querySelector('[data-dk="date"]').addEventListener("input",e=>{
    day.date=e.target.value; save();
    const info2=dayInfo(day.date);
    wrap.querySelector("[data-wk]").textContent = info2?info2.weekday:"";
  });
  wrap.querySelector('[data-dk="label"]').addEventListener("input",e=>{ day.label=e.target.value; save(); });
  // move / delete day
  wrap.querySelector('[data-mv="-1"]').addEventListener("click",()=>moveDay(l,di,-1));
  wrap.querySelector('[data-mv="1"]').addEventListener("click",()=>moveDay(l,di,1));
  wrap.querySelector("[data-del-day]").addEventListener("click",()=>{
    if(!confirm("Delete Day "+(di+1)+"?")) return;
    l.days.splice(di,1); save(); renderDayList(l);
  });
  // activities
  const actBox=wrap.querySelector("[data-acts]");
  (day.activities||[]).forEach((a,ai)=>actBox.appendChild(actEditorEl(l,day,a,ai)));
  wrap.querySelector("[data-add-act]").addEventListener("click",()=>{
    day.activities.push({id:uid(),time:"",title:"",type:(DATA.categories[0]&&DATA.categories[0].id)||"",note:""});
    save(); renderDayList(l);
  });
  return wrap;
}

function actEditorEl(l,day,a,ai){
  const row=document.createElement("div");
  row.className="act-edit";
  row.style.setProperty("--catcolor",catColor(a.type));
  row.innerHTML=`
    <div class="grip">●</div>
    <div style="flex:1">
      <div class="act-fields">
        <input data-ak="time" value="${esc(a.time||"")}" placeholder="Time">
        <input data-ak="title" value="${esc(a.title||"")}" placeholder="What are we doing?">
        <select data-ak="type">${catOptions(a.type)}</select>
      </div>
      <textarea data-ak="note" placeholder="Notes (optional)" style="min-height:44px;margin-top:6px">${esc(a.note||"")}</textarea>
    </div>
    <button class="btn small danger" data-del-act>✕</button>
  `;
  row.querySelectorAll("[data-ak]").forEach(inp=>{
    inp.addEventListener("input",e=>{
      const k=inp.getAttribute("data-ak"); a[k]=e.target.value; save();
      if(k==="type") row.style.setProperty("--catcolor",catColor(a.type));
    });
  });
  row.querySelector("[data-del-act]").addEventListener("click",()=>{
    day.activities.splice(ai,1); save(); renderDayList(l);
  });
  return row;
}

function addDay(legId){
  const l=DATA.legs[legIndex(legId)]; if(!l) return;
  const last=l.days[l.days.length-1];
  const nextDate = last && last.date ? addDays(last.date,1) : "";
  l.days.push({id:uid(),date:nextDate,label:"",activities:[]});
  save(); renderDayList(l);
}
function moveDay(l,di,dir){
  const j=di+dir; if(j<0||j>=l.days.length) return;
  [l.days[di],l.days[j]]=[l.days[j],l.days[di]]; save(); renderDayList(l);
}

/* ---------------- IMPORT / EXPORT ---------------- */
function doExport(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="data.json"; a.click();
  URL.revokeObjectURL(a.href); toast("Downloaded data.json");
}
function doImport(){ document.getElementById("fileInput").click(); }
document.getElementById("fileInput").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const obj=JSON.parse(rd.result);
      if(!obj.trip||!Array.isArray(obj.legs)) throw new Error("bad shape");
      DATA=normalize(obj); save(); EDIT=false; location.hash=""; render(); toast("Imported!");
    }catch(err){ alert("That file doesn't look like a valid trip data.json."); }
  };
  rd.readAsText(f); e.target.value="";
});

/* ---------------- BOOT ---------------- */
loadData().then(render);
</script>
</body>
</html>
