<style>
:root{
  --bg:#fbf7f4; --card:#ffffff; --ink:#3a2e2a; --muted:#8a7a72;
  --accent:#c46b6b; --accent-dark:#a34f4f; --gold:#c9a24b; --line:#ece0d8;

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;}
h1,h2,h3{font-family:Georgia,"Times New Roman",serif;font-weight:600;margin:0 0 .3em}
a{color:var(--accent-dark);text-decoration:none}
img{max-width:100%}
header{position:sticky;top:0;z-index:1000;background:rgba(251,247,244,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.bar{max-width:1080px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px}
.brand{font-family:Georgia,serif;font-size:1.15rem;color:var(--accent-dark);cursor:pointer;white-space:nowrap}
.brand .heart{color:var(--accent)}
.spacer{flex:1}
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:7px 14px;border-radius:999px;cursor:pointer;font-size:.86rem;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent-dark)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-dark)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.danger{color:#b5453b;border-color:#ecccc8}
.btn.small{padding:4px 10px;font-size:.78rem}
main{max-width:1080px;margin:0 auto;padding:22px 20px 80px}
.hero{text-align:center;padding:26px 10px 10px}
.hero h1{font-size:2.5rem;line-height:1.1}
.hero .sub{color:var(--muted);font-size:1.05rem}
.hero .dates{display:inline-block;margin-top:8px;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;font-size:.8rem}
#map, .leg-map{height:420px;width:100%;border-radius:var(--radius);box-shadow:var(--shadow);margin:18px 0;z-index:1}

.section-title{display:flex;align-items:center;gap:10px;margin:26px 0 6px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:14px}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.leg-editor{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}

.pickmap{height:220px;border-radius:12px;margin:6px 0 12px;border:1px solid var(--line)}

.day-edit .dh .wk{color:var(--gold);font-size:.76rem;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.act-edit{display:flex;gap:8px;align-items:flex-start;margin:0 0 8px}
.act-edit .grip{color:var(--catcolor,#bbb);padding-top:10px;font-size:1.1rem;line-height:1}

.cat-row{display:flex;align-items:center;gap:8px;margin:0 0 8px}
.cat-row input[type=text]{flex:1}

.mini{font-size:.8rem;color:var(--muted)}
footer{max-width:1080px;margin:0 auto;padding:20px;color:var(--muted);font-size:.8rem;text-align:center}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:.88rem;opacity:0;transition:.3s;pointer-events:none;z-index:2000}
.toast.show{opacity:1}
</style>

<body>
<header>
  <div class="bar">
    <div class="brand" onclick="go('')"><span class="heart">&#10084;</span> <span id="brandTitle">Our Honeymoon</span></div>
    <div class="spacer"></div>
    <span class="cloud-status" title="Where your edits are stored"><span class="cloud-dot" id="cloudDot"></span><span id="cloudLabel">…</span></span>
    <button class="btn ghost" id="editToggle" onclick="toggleEdit()">Edit</button>
    <button class="btn ghost small" onclick="doImport()">Import</button>
    <button class="btn ghost small" onclick="doExport()">Export</button>
  </div>
</header>
<main id="app"></main>
<footer>
  Made with love &middot; synced via JSONBin &middot;
  <a href="#" onclick="resetData();return false;">reset to default trip</a>
</footer>
<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="application/json" class="hidden" />

<script>
/* ==================================================================
   CLOUD SYNC SETUP  (JSONBin.io - free, dead simple)

   Your itinerary lives in a "bin" (a JSON blob at a URL) on JSONBin.
   Both partners' browsers read/write to the same bin. To wire it up:

   1. Go to https://jsonbin.io and sign up (email or Google, ~30 seconds).
   2. Click "Create Bin". A JSON editor opens - just paste  {}  and hit Save.
   3. Copy the "Bin ID" (in the URL after /b/, looks like 65abc123def45678).
   4. Click "API Keys" in the sidebar, copy the "X-MASTER-KEY".
   5. Paste both values below, replacing YOUR_BIN_ID and YOUR_MASTER_KEY.

   That's it - no rules, no config file, no CDN scripts.
   If you skip this, the site still works, but only saves to your own
   browser (same as before). Change nothing else.
   ================================================================== */
const JSONBIN_ID  = "6a4c6589f5f4af5e296a1d4d";
const JSONBIN_KEY = "$2a$10$sqn6debCZo0I2yuWkAd9P.1hTv1arIiZhNowqeHkibfN4KsH18Ei.";

const isCloudConfigured =
  JSONBIN_ID  && !JSONBIN_ID.startsWith("YOUR_") &&
  JSONBIN_KEY && !JSONBIN_KEY.startsWith("YOUR_");

const BIN_URL = "https://api.jsonbin.io/v3/b/" + JSONBIN_ID;
const BIN_HEADERS = {
  "Content-Type": "application/json",
  "X-Master-Key": JSONBIN_KEY
};

function setCloudStatus(state, label){
  const dot=document.getElementById("cloudDot"), lab=document.getElementById("cloudLabel");
  if(!dot) return;
  dot.className="cloud-dot "+(state||"");
  if(lab) lab.textContent=label||"";
}

const LS_KEY = "honeymoon_data_v2";
const DEFAULT_CATEGORIES = [
  {id:"transport", label:"Transportation", color:"#2f6fb0"},
  {id:"dining", label:"Dining", color:"#c0562e"},
  {id:"boat", label:"Boat outing", color:"#1d9e75"},
  {id:"winery", label:"Winery", color:"#8e3b63"},
  {id:"sightseeing", label:"Sightseeing", color:"#b8811a"},
  {id:"lodging", label:"Lodging", color:"#6b6b6b"},
  {id:"leisure", label:"Free time", color:"#4f8a3d"}
];
const DEFAULT_DATA = {
  trip:{ title:"Our Honeymoon", subtitle:"", dates:"Autumn 2026" },
  categories: DEFAULT_CATEGORIES.map(c=>({...c})),
  legs:[
    {
      id:"paris", name:"Paris, France", when:"Days 1–3",
      lat:48.8566, lng:2.3522, photo:"",
      summary:"Where it all begins — croissants, the Seine at dusk, and a kiss under the Eiffel Tower.",
      lodging:"Hôtel des Amoureux, Le Marais", highlights:[], notes:"",
      days:[]
    },
    {
      id:"santorini", name:"Santorini, Greece", when:"Days 4–6",
      lat:36.3932, lng:25.4615, photo:"",
      summary:"White-washed cliffs, blue domes, and the most famous sunset in the world.",
      lodging:"Cave suite in Oia", highlights:[], notes:"",
      days:[]
    }
  ]
};

let DATA = null;

function normalize(d){
  d = d || {};
  d.trip = d.trip || {title:"Our Honeymoon", subtitle:"", dates:""};
  if(d.trip.subtitle == null) d.trip.subtitle = "";
  if(!Array.isArray(d.categories) || d.categories.length===0){
    d.categories = DEFAULT_CATEGORIES.map(c=>({...c}));
  }
  d.legs = Array.isArray(d.legs) ? d.legs : [];
  d.legs.forEach(l=>{
    if(!l.id) l.id = uid();
    if(!Array.isArray(l.highlights)) l.highlights = [];
    if(!Array.isArray(l.days)) l.days = [];
    l.days.forEach(day=>{
      if(!day.id) day.id = uid();
      if(day.date==null) day.date = "";
      if(day.label==null) day.label = "";
      if(!Array.isArray(day.activities)) day.activities = [];
      day.activities.forEach(a=>{
        if(!a.id) a.id = uid();
        if(a.time==null) a.time = "";
        if(a.title==null) a.title = "";
        if(!a.type) a.type = (d.categories[0]&&d.categories[0].id) || "sightseeing";
        if(a.note==null) a.note = "";
        if(a.place==null) a.place = "";
        if(a.lat==null) a.lat = null;
        if(a.lng==null) a.lng = null;
      });
      sortDayActivities(day);
    });
  });
  return d;
}

/* ---------------- LOAD / SAVE (JSONBin-first, localStorage cache) ---------------- */
async function tryFetchSeedJson(){
  try{
    const r = await fetch("data.json", {cache:"no-store"});
    if(r.ok) return normalize(await r.json());
  }catch(e){}
  return null;
}

async function fetchFromCloud(){
  const r = await fetch(BIN_URL + "/latest", {headers: BIN_HEADERS, cache: "no-store"});
  if(!r.ok) throw new Error("JSONBin GET failed: " + r.status);
  const j = await r.json();
  // JSONBin wraps our data in {record: ..., metadata: ...}
  return j.record;
}

async function writeToCloud(data){
  const r = await fetch(BIN_URL, {
    method: "PUT",
    headers: BIN_HEADERS,
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error("JSONBin PUT failed: " + r.status);
}

async function loadData(){
  if(!isCloudConfigured){
    setCloudStatus("","local only");
    const saved = localStorage.getItem(LS_KEY);
    if(saved){ try{ DATA = normalize(JSON.parse(saved)); return; }catch(e){} }
    const seed = await tryFetchSeedJson();
    DATA = seed || normalize(JSON.parse(JSON.stringify(DEFAULT_DATA)));
    return;
  }
  setCloudStatus("","connecting…");
  try{
    const cloud = await fetchFromCloud();
    // A brand new bin might contain `{}` - if it doesn't look like our shape, seed it.
    if(cloud && cloud.trip && Array.isArray(cloud.legs)){
      DATA = normalize(cloud);
      localStorage.setItem(LS_KEY, JSON.stringify(DATA));
      setCloudStatus("ok","synced");
      startBackgroundRefresh();
      return;
    }
    // Bin is empty (freshly created) - seed it from local edits, data.json, or defaults.
    const saved = localStorage.getItem(LS_KEY);
    let seed = null;
    if(saved){ try{ seed = normalize(JSON.parse(saved)); }catch(e){} }
    if(!seed) seed = await tryFetchSeedJson();
    DATA = seed || normalize(JSON.parse(JSON.stringify(DEFAULT_DATA)));
    localStorage.setItem(LS_KEY, JSON.stringify(DATA));
    try{
      await writeToCloud(DATA);
      setCloudStatus("ok","synced");
    }catch(e){
      console.error("Could not seed cloud bin.", e);
      setCloudStatus("err","offline");
    }
    startBackgroundRefresh();
    return;
  }catch(e){
    console.error("Could not reach JSONBin, using offline data.", e);
    setCloudStatus("err","offline");
  }
  // Cloud unreachable - use whatever local data we have.
  const saved = localStorage.getItem(LS_KEY);
  if(saved){ try{ DATA = normalize(JSON.parse(saved)); startBackgroundRefresh(); return; }catch(e){} }
  const seed = await tryFetchSeedJson();
  DATA = seed || normalize(JSON.parse(JSON.stringify(DEFAULT_DATA)));
  startBackgroundRefresh();
}

let saveTimer=null;
async function doCloudSave(){
  try{
    await writeToCloud(DATA);
    setCloudStatus("ok","synced");
  }catch(e){
    console.error("Cloud save failed", e);
    setCloudStatus("err","save failed - check connection");
  }
}
function flushPendingSave(){
  if(!isCloudConfigured || !saveTimer) return;
  clearTimeout(saveTimer); saveTimer=null;
  doCloudSave();
}
function save(){
  localStorage.setItem(LS_KEY, JSON.stringify(DATA));
  if(!isCloudConfigured) return;
  clearTimeout(saveTimer);
  setCloudStatus("","saving…");
  // Longer debounce - JSONBin free tier has a monthly request cap,
  // and there's no realtime channel anyway, so no rush.
  saveTimer = setTimeout(()=>{ saveTimer=null; doCloudSave(); }, 1200);
}
// Flush pending save if tab closes/backgrounds, so the last edit isn't lost.
window.addEventListener("beforeunload", flushPendingSave);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden") flushPendingSave(); });

// JSONBin doesn't push realtime updates, so instead we pull-refresh whenever
// the user comes back to the tab or window. Natural "give me the latest" moment.
async function pullRefresh(){
  if(!isCloudConfigured) return;
  if(EDIT) return; // don't clobber in-progress edits
  if(saveTimer) return; // there's an outbound save queued; skip
  try{
    const cloud = await fetchFromCloud();
    if(!cloud || !cloud.trip) return;
    const incoming = JSON.stringify(normalize(cloud));
    const current = JSON.stringify(DATA);
    if(incoming === current) return; // no change
    DATA = normalize(cloud);
    localStorage.setItem(LS_KEY, JSON.stringify(DATA));
    setCloudStatus("ok","synced");
    render();
  }catch(e){
    console.error("Refresh failed", e);
    setCloudStatus("err","offline");
  }
}
function startBackgroundRefresh(){
  window.addEventListener("focus", pullRefresh);
  document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") pullRefresh(); });
}

function resetData(){
  if(!confirm("Discard all edits and reload the default starter trip?")) return;
  DATA = normalize(JSON.parse(JSON.stringify(DEFAULT_DATA)));
  save();
  location.hash=""; render();
}

/* ---------------- ROUTING ---------------- */
let EDIT = false;
function go(hash){ location.hash = hash; }
window.addEventListener("hashchange", render);
function currentRoute(){
  const h = location.hash.replace(/^#\/?/,"");
  if(h.startsWith("leg/")) return {view:"leg", id:h.slice(4)};
  return {view:"home"};
}

/* ---------------- HELPERS ---------------- */
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function legIndex(id){return DATA.legs.findIndex(l=>l.id===id);}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}
function uid(){return "x"+Math.random().toString(36).slice(2,9);}
function cat(id){return DATA.categories.find(c=>c.id===id) || {id:id,label:id||"—",color:"#bbb"};}
function catColor(id){return cat(id).color;}
function catLabel(id){return cat(id).label;}
function dayInfo(dateStr){
  if(!dateStr) return null;
  const p = String(dateStr).split("-");
  if(p.length!==3) return null;
  const dt = new Date(+p[0], +p[1]-1, +p[2]);
  if(isNaN(dt.getTime())) return null;
  return { weekday: dt.toLocaleDateString(undefined,{weekday:"long"}), nice: dt.toLocaleDateString(undefined,{month:"long",day:"numeric",year:"numeric"}) };
}
function addDays(dateStr, n){
  const p = String(dateStr).split("-");
  if(p.length!==3) return "";
  const dt = new Date(+p[0], +p[1]-1, +p[2]);
  if(isNaN(dt.getTime())) return "";
  dt.setDate(dt.getDate()+n);
  const mm = String(dt.getMonth()+1).padStart(2,"0");
  const dd = String(dt.getDate()).padStart(2,"0");
  return dt.getFullYear()+"-"+mm+"-"+dd;
}
function hasLoc(o){ return !!o && Number.isFinite(o.lat) && Number.isFinite(o.lng); }
function distMi(la1,lo1,la2,lo2){
  const R=3958.8, toR=x=>x*Math.PI/180;
  const dLa=toR(la2-la1), dLo=toR(lo2-lo1);
  const s=Math.sin(dLa/2)**2 + Math.cos(toR(la1))*Math.cos(toR(la2))*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}
function distanceText(la1,lo1,la2,lo2){
  const mi=distMi(la1,lo1,la2,lo2);
  if(mi<0.1) return Math.round(mi*5280)+" ft";
  return mi.toFixed(mi<10?1:0)+" mi";
}
function parseTimeMinutes(str){
  if(str==null) return null;
  const s=String(str).trim().toLowerCase();
  if(!s) return null;
  const m=s.match(/^(\d{1,2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?/);
  if(m){
    let h=+m[1]; const min=m[2]?+m[2]:0; const ap=m[3]?m[3].replace(/\./g,""):"";
    if(h<=23 && min<=59){
      if(ap==="am"){ if(h===12) h=0; }
      else if(ap==="pm"){ if(h!==12) h+=12; }
      return h*60+min;
    }
  }
  const kw=[["midnight",0],["afternoon",14*60],["morning",9*60],["midday",12*60],
    ["noon",12*60],["lunch",12*60+30],["dawn",6*60],["sunrise",6*60],
    ["evening",18*60],["sunset",19*60],["dinner",19*60],["tonight",20*60],["night",21*60]];
  for(const [k,v] of kw){ if(s.indexOf(k)>-1) return v; }
  return null;
}
function sortedActivities(day){
  const arr=(day.activities||[]).map((a,i)=>[a,i]);
  arr.sort((x,y)=>{
    const ta=parseTimeMinutes(x[0].time), tb=parseTimeMinutes(y[0].time);
    if(ta==null && tb==null) return x[1]-y[1];
    if(ta==null) return 1;
    if(tb==null) return -1;
    if(ta!==tb) return ta-tb;
    return x[1]-y[1];
  });
  return arr.map(p=>p[0]);
}
function sortDayActivities(day){ if(!day) return; day.activities = sortedActivities(day); }

function collectPinned(l){
  const out=[];
  (l.days||[]).forEach((d,di)=>(d.activities||[]).forEach(a=>{ if(hasLoc(a)) out.push({a, dayNum:di+1}); }));
  return out;
}

function initLocalMap(l){
  const el=document.getElementById("localmap"); if(!el||!window.L) return;
  const map=L.map(el,{scrollWheelZoom:false}); maps.push(map);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OpenStreetMap",maxZoom:19}).addTo(map);
  const pts=[];
  if(hasLoc(l)){ L.marker([l.lat,l.lng]).addTo(map).bindPopup("<b>🏨 "+esc(l.lodging||l.name||"Hotel")+"</b>"); pts.push([l.lat,l.lng]); }
  collectPinned(l).forEach(({a,dayNum})=>{
    const d = hasLoc(l) ? " · ~"+distanceText(l.lat,l.lng,a.lat,a.lng)+" from hotel" : "";
    L.circleMarker([a.lat,a.lng],{radius:9,color:"#fff",weight:2,fillColor:catColor(a.type),fillOpacity:1}).addTo(map)
      .bindPopup("<b>"+esc(a.title||"Spot")+"</b><br>"+esc(catLabel(a.type))+" · Day "+dayNum+d);
    pts.push([a.lat,a.lng]);
  });
  if(pts.length>1) map.fitBounds(pts,{padding:[45,45]});
  else if(pts.length===1) map.setView(pts[0],14);
  else map.setView([20,0],2);
  setTimeout(()=>{try{map.invalidateSize();}catch(e){}},60);
}

function toggleAct(dayId, actId){
  const det=document.getElementById("det-"+dayId+"-"+actId);
  const actEl=document.getElementById("act-"+dayId+"-"+actId);
  if(!det) return;
  if(!det.dataset.built){
    buildActDetail(det, dayId, actId);
    det.dataset.built="1";
    det.classList.remove("hidden");
    if(actEl) actEl.classList.add("open");
    return;
  }
  const nowHidden = det.classList.toggle("hidden");
  if(actEl) actEl.classList.toggle("open", !nowHidden);
}

function buildActDetail(det, dayId, actId){
  const l=CURRENT_LEG; if(!l) return;
  const day=(l.days||[]).find(d=>d.id===dayId);
  const a=day && day.activities.find(x=>x.id===actId);
  if(!a){ det.innerHTML=""; return; }
  const activityHasLoc=hasLoc(a), hotelHasLoc=hasLoc(l);
  const dist=(activityHasLoc&&hotelHasLoc)?distanceText(l.lat,l.lng,a.lat,a.lng):"";
  const mapId="amap-"+dayId+"-"+actId;
  det.innerHTML=`
    ${a.place?`<div class="place">${esc(a.place)}</div>`:""}
    ${dist?`<div class="dist">~${esc(dist)} from hotel</div>`:""}
    <div class="anote">${a.note?esc(a.note):'<span class="mini">No notes yet — add some in Edit mode.</span>'}</div>
    ${activityHasLoc ? `<div class="act-mini" id="${mapId}"></div>` : `<div class="mini" style="margin-top:6px">No location pinned yet. Add one in Edit → this activity → "Pin on map".</div>`}
  `;
  if(activityHasLoc) setTimeout(()=>initActMiniMap(mapId, l, a), 0);
}

function initActMiniMap(id, l, a){
  const el=document.getElementById(id); if(!el||!window.L) return;
  const map=L.map(el,{scrollWheelZoom:false}); maps.push(map);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OpenStreetMap",maxZoom:19}).addTo(map);
  const pts=[];
  if(hasLoc(l)){ L.marker([l.lat,l.lng]).addTo(map).bindPopup("🏨 "+esc(l.lodging||"Hotel")); pts.push([l.lat,l.lng]); }
  L.circleMarker([a.lat,a.lng],{radius:9,color:"#fff",weight:2,fillColor:catColor(a.type),fillOpacity:1}).addTo(map).bindPopup(esc(a.title||"Spot")); pts.push([a.lat,a.lng]);
  if(pts.length>1) map.fitBounds(pts,{padding:[40,40]});
  else map.setView(pts[0],14);
  setTimeout(()=>{try{map.invalidateSize();}catch(e){}},60);
}

function timelineHTML(l){
  if(!l.days || l.days.length===0){
    return `<div class="mini">No days added yet. Click <b>Edit</b> to build a day-by-day plan.</div>`;
  }
  return l.days.map((day,di)=>{
    const info = dayInfo(day.date);
    const head = `
      <div class="dhead">
        <span class="dnum">Day ${di+1}${day.label?` · ${esc(day.label)}`:""}</span>
        ${info?`<span class="dwk">${esc(info.weekday)}</span><span class="ddate">${esc(info.nice)}</span>`:``}
      </div>`;
    const acts = (day.activities&&day.activities.length)
      ? `<div class="acts">${sortedActivities(day).map(a=>{
          const col=catColor(a.type);
          const aid=day.id+"-"+a.id;
          const marks=[];
          if(a.note) marks.push('<i title="has notes">✎</i>');

          const meta = marks.length?` <span class="mini">${marks.join(" ")}</span>`:"";
          return `<div class="act" id="act-${aid}" style="--catcolor:${esc(col)}" onclick="toggleAct('${day.id}','${a.id}')">

            </div>
            <div class="act-detail hidden" id="det-${aid}"></div>`;
        }).join("")}</div>`
      : `<div class="day-empty">No activities yet.</div>`;
    return `<div class="day">${head}${acts}</div>`;
  }).join("");
}

function initPicker(l){

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OSM",maxZoom:18}).addTo(map);
  let marker=has?L.marker(center).addTo(map):null;
  map.on("click",e=>{
    l.lat=+e.latlng.lat.toFixed(5); l.lng=+e.latlng.lng.toFixed(5); save();
    if(marker) marker.setLatLng(e.latlng); else marker=L.marker(e.latlng).addTo(map);
    const la=document.querySelector('[data-lk="lat"]'), lo=document.querySelector('[data-lk="lng"]');

  });
  wrap.querySelector('[data-dk="label"]').addEventListener("input",e=>{ day.label=e.target.value; save(); });
  wrap.querySelector('[data-mv="-1"]').addEventListener("click",()=>moveDay(l,di,-1));
  wrap.querySelector('[data-mv="1"]').addEventListener("click",()=>moveDay(l,di,1));
  wrap.querySelector("[data-del-day]").addEventListener("click",()=>{
    if(!confirm("Delete Day "+(di+1)+"?")) return;
    l.days.splice(di,1); save(); renderDayList(l);
  });
  const actBox=wrap.querySelector("[data-acts]");
  sortedActivities(day).forEach(a=>actBox.appendChild(actEditorEl(l,day,a)));
  wrap.querySelector("[data-add-act]").addEventListener("click",()=>{
    day.activities.push({id:uid(),time:"",title:"",type:(DATA.categories[0]&&DATA.categories[0].id)||"",note:""});
    save(); renderDayList(l);
  });
  return wrap;
}

function actEditorEl(l,day,a){
  const row=document.createElement("div");
  row.className="act-edit";
  row.style.setProperty("--catcolor",catColor(a.type));
  row.innerHTML=`
    <div class="grip">●</div>
    <div style="flex:1">
      <div class="act-fields">
        <input data-ak="time" value="${esc(a.time||"")}" placeholder="Time">
        <input data-ak="title" value="${esc(a.title||"")}" placeholder="What are we doing?">
        <select data-ak="type">${catOptions(a.type)}</select>
      </div>
      <textarea data-ak="note" placeholder="Notes (optional)" style="min-height:44px;margin-top:6px">${esc(a.note||"")}</textarea>
      <div class="act-loc">
        <input data-ak="place" value="${esc(a.place||"")}" placeholder="Place or address (optional)">
        <div class="row2" style="margin-top:8px">
          <input data-ak="lat" value="${a.lat??""}" placeholder="Latitude">
          <input data-ak="lng" value="${a.lng??""}" placeholder="Longitude">
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
          <button type="button" class="btn small" data-pin>📍 Pin on map</button>
          <span class="mini">Click the map to place this spot near your hotel.</span>
        </div>
        <div class="apick hidden" data-actpick></div>
      </div>
    </div>
    <button class="btn small danger" data-del-act>✕</button>
  `;
  row.querySelectorAll("[data-ak]").forEach(inp=>{
    inp.addEventListener("input",e=>{
      const k=inp.getAttribute("data-ak"); let v=e.target.value;
      if(k==="lat"||k==="lng"){ a[k]= v===""?null:parseFloat(v); }
      else { a[k]=v; }
      save();
      if(k==="type") row.style.setProperty("--catcolor",catColor(a.type));
    });
  });
  const timeInp=row.querySelector('[data-ak="time"]');
  timeInp.addEventListener("change",()=>{ sortDayActivities(day); save(); renderDayList(l); });
  const pickBtn=row.querySelector("[data-pin]");
  const pickDiv=row.querySelector("[data-actpick]");
  pickBtn.addEventListener("click",()=>{
    if(pickDiv.classList.contains("hidden")){
      pickDiv.classList.remove("hidden");
      pickBtn.textContent="Hide map";
      if(!pickDiv.dataset.built){ pickDiv.dataset.built="1"; initActPicker(pickDiv, a, row, l); }
    } else {
      pickDiv.classList.add("hidden"); pickBtn.textContent="📍 Pin on map";
    }
  });
  row.querySelector("[data-del-act]").addEventListener("click",()=>{
    const idx=day.activities.indexOf(a);
    if(idx>-1) day.activities.splice(idx,1);
    save(); renderDayList(l);
  });
  return row;
}

function initActPicker(div, a, row, l){
  const has=hasLoc(a);
  const center=has?[a.lat,a.lng]:(hasLoc(l)?[l.lat,l.lng]:[20,0]);
  const zoom=has?15:(hasLoc(l)?14:2);
  const map=L.map(div,{scrollWheelZoom:false}).setView(center,zoom); maps.push(map);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OSM",maxZoom:19}).addTo(map);
  if(hasLoc(l)) L.marker([l.lat,l.lng]).addTo(map).bindPopup("🏨 Hotel");
  let marker=has?L.circleMarker(center,{radius:9,color:"#fff",weight:2,fillColor:catColor(a.type),fillOpacity:1}).addTo(map):null;
  map.on("click",e=>{
    a.lat=+e.latlng.lat.toFixed(5); a.lng=+e.latlng.lng.toFixed(5); save();
    if(marker) marker.setLatLng(e.latlng);
    else marker=L.circleMarker(e.latlng,{radius:9,color:"#fff",weight:2,fillColor:catColor(a.type),fillOpacity:1}).addTo(map);
    const la=row.querySelector('[data-ak="lat"]'), lo=row.querySelector('[data-ak="lng"]');
    if(la) la.value=a.lat; if(lo) lo.value=a.lng;
    toast("Pin set");
  });
  setTimeout(()=>{try{map.invalidateSize();}catch(e){}},60);
}

function addDay(legId){
  const l=DATA.legs[legIndex(legId)]; if(!l) return;
  const last=l.days[l.days.length-1];
  const nextDate = last && last.date ? addDays(last.date,1) : "";
  l.days.push({id:uid(),date:nextDate,label:"",activities:[]});
  save(); renderDayList(l);
}
function moveDay(l,di,dir){
  const j=di+dir; if(j<0||j>=l.days.length) return;
  [l.days[di],l.days[j]]=[l.days[j],l.days[di]]; save(); renderDayList(l);
}

/* ---------------- IMPORT / EXPORT (still handy as a manual backup) ---------------- */
function doExport(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="data.json"; a.click();
  URL.revokeObjectURL(a.href); toast("Downloaded data.json (backup copy)");
}
function doImport(){ document.getElementById("fileInput").click(); }
document.getElementById("fileInput").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const obj=JSON.parse(rd.result);
      if(!obj.trip||!Array.isArray(obj.legs)) throw new Error("bad shape");
      DATA=normalize(obj); save(); EDIT=false; location.hash=""; render(); toast("Imported and synced to cloud!");
    }catch(err){ alert("That file doesn't look like a valid trip data.json."); }
  };
  rd.readAsText(f); e.target.value="";
});

/* ---------------- BOOT ---------------- */
loadData().then(render);
</script>
</body>
</html>
